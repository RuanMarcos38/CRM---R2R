name: Fix frontend secret cleanup 20260707

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch legacy browser token cleanup
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'frontend-public_html/assets/crm-saas-bridge.js';
          let src = fs.readFileSync(file, 'utf8');
          if (!src.includes("localStorage.getItem('r2r_meta_ads'")) {
            const needle = `    try {
              var ia = JSON.parse(localStorage.getItem('r2r_ia_cfg') || '{}');
              if (ia.key || ia.apiKey) {
                delete ia.key;
                delete ia.apiKey;
                localStorage.setItem('r2r_ia_cfg', JSON.stringify(ia));
              }
            } catch (e) {}
          }

          async function loadRuntimeConfig() {`;
            const replacement = `    try {
              var ia = JSON.parse(localStorage.getItem('r2r_ia_cfg') || '{}');
              if (ia.key || ia.apiKey) {
                delete ia.key;
                delete ia.apiKey;
                localStorage.setItem('r2r_ia_cfg', JSON.stringify(ia));
              }
            } catch (e) {}
            try {
              var meta = JSON.parse(localStorage.getItem('r2r_meta_ads') || '{}');
              if (meta.token || meta.accessToken || meta.access_token || meta.apiKey || meta.api_key) {
                delete meta.token;
                delete meta.accessToken;
                delete meta.access_token;
                delete meta.apiKey;
                delete meta.api_key;
                localStorage.setItem('r2r_meta_ads', JSON.stringify(meta));
              }
            } catch (e) {}
            try {
              var metaWa = JSON.parse(localStorage.getItem('r2r_wa_meta') || '{}');
              if (metaWa.token || metaWa.accessToken || metaWa.access_token || metaWa.apiKey || metaWa.api_key) {
                delete metaWa.token;
                delete metaWa.accessToken;
                delete metaWa.access_token;
                delete metaWa.apiKey;
                delete metaWa.api_key;
                localStorage.setItem('r2r_wa_meta', JSON.stringify(metaWa));
              }
            } catch (e) {}
          }

          async function loadRuntimeConfig() {`;
            if (!src.includes(needle)) throw new Error('clearFrontendSecrets needle not found');
            src = src.replace(needle, replacement);
            fs.writeFileSync(file, src);
          }
          NODE
      - name: Validate package
        run: |
          npm run check
          npm test
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-frontend-secret-cleanup-20260707.yml
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add frontend-public_html/assets/crm-saas-bridge.js
          git commit -m "fix: clear legacy Meta tokens in browser storage"
          git push
