name: Fix frontend secret cleanup 20260707

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Patch legacy browser token cleanup
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'frontend-public_html/assets/crm-saas-bridge.js';
          let src = fs.readFileSync(file, 'utf8');
          const fnStart = src.indexOf('  function clearFrontendSecrets() {');
          const nextFn = src.indexOf('\n  async function loadRuntimeConfig()', fnStart);
          if (fnStart < 0 || nextFn < 0) throw new Error('clearFrontendSecrets boundaries not found');
          const block = src.slice(fnStart, nextFn);
          if (!block.includes("localStorage.getItem('r2r_meta_ads'")) {
            const closePos = src.lastIndexOf('\n  }', nextFn);
            if (closePos < fnStart) throw new Error('clearFrontendSecrets closing brace not found');
            const extra = [
              '    try {',
              "      var meta = JSON.parse(localStorage.getItem('r2r_meta_ads') || '{}');",
              '      if (meta.token || meta.accessToken || meta.access_token || meta.apiKey || meta.api_key) {',
              '        delete meta.token;',
              '        delete meta.accessToken;',
              '        delete meta.access_token;',
              '        delete meta.apiKey;',
              '        delete meta.api_key;',
              "        localStorage.setItem('r2r_meta_ads', JSON.stringify(meta));",
              '      }',
              '    } catch (e) {}',
              '    try {',
              "      var metaWa = JSON.parse(localStorage.getItem('r2r_wa_meta') || '{}');",
              '      if (metaWa.token || metaWa.accessToken || metaWa.access_token || metaWa.apiKey || metaWa.api_key) {',
              '        delete metaWa.token;',
              '        delete metaWa.accessToken;',
              '        delete metaWa.access_token;',
              '        delete metaWa.apiKey;',
              '        delete metaWa.api_key;',
              "        localStorage.setItem('r2r_wa_meta', JSON.stringify(metaWa));",
              '      }',
              '    } catch (e) {}'
            ].join('\n');
            src = src.slice(0, closePos) + '\n' + extra + src.slice(closePos);
            fs.writeFileSync(file, src);
          }
          NODE
      - name: Validate package
        run: |
          npm run check
          npm test
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-frontend-secret-cleanup-20260707.yml
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add frontend-public_html/assets/crm-saas-bridge.js
          git commit -m "fix: clear legacy Meta tokens in browser storage"
          git push
